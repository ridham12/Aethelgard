<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Athelgard</title>
  <meta name="description" content="Review your selected Athelgard timepieces with an elegant, minimal cart experience.">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="cart">
  <div class="site-shell">
    <header class="site-header">
      <a class="brandmark" href="index.html" aria-label="Athelgard home">
        <span class="brandmark-word">ATHELGARD</span>
        <span class="brandmark-tag">Swiss-Inspired Watch House</span>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">Craftsmanship</a>
        <a href="cart.html" class="is-current">Cart <span class="cart-count" data-cart-count>0</span></a>
